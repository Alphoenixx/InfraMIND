# ============================================================
# InfraMIND v3 — Default Configuration
# Workload-Aware, Structure-Learning Infrastructure Intelligence
# ============================================================

# ----------------------------------------------------------
# DAG Topology: 7-service microservice architecture
# ----------------------------------------------------------
dag:
  services:
    - name: api_gateway
      base_service_time: 5.0       # ms — mean service time
      base_replicas: 2
      downstream: [auth, catalog]

    - name: auth
      base_service_time: 10.0
      base_replicas: 2
      downstream: [user_db]

    - name: catalog
      base_service_time: 15.0
      base_replicas: 3
      downstream: [product_db, recommendation]

    - name: recommendation
      base_service_time: 25.0
      base_replicas: 2
      downstream: [ml_engine]

    - name: ml_engine
      base_service_time: 50.0
      base_replicas: 4
      downstream: []

    - name: user_db
      base_service_time: 8.0
      base_replicas: 2
      downstream: []

    - name: product_db
      base_service_time: 12.0
      base_replicas: 2
      downstream: []

# ----------------------------------------------------------
# Parameter Search Space
# ----------------------------------------------------------
parameters:
  per_service:
    replicas:
      min: 1
      max: 16
      type: int
    cpu_millicores:
      min: 100
      max: 4000
      type: int
    memory_mb:
      min: 128
      max: 8192
      type: int
    queue_capacity:
      min: 10
      max: 500
      type: int
  global:
    connection_pool_size:
      min: 5
      max: 100
      type: int

# ----------------------------------------------------------
# Optimization Configuration
# ----------------------------------------------------------
optimization:
  n_initial: 20           # Sobol quasi-random initial samples
  n_iterations: 50        # BO iterations after initialization
  batch_size: 4           # Parallel candidates per iteration
  seed: 42

  turbo:
    length_init: 0.8      # Initial trust region length (unit hypercube)
    length_min: 0.005     # Minimum TR length before restart
    length_max: 1.6       # Maximum TR length
    success_tolerance: 3  # Consecutive improvements to expand
    failure_tolerance: 5  # Consecutive failures to shrink
    volatility_alpha: 1.5 # Workload burstiness sensitivity

# ----------------------------------------------------------
# Objective Weights & SLA
# ----------------------------------------------------------
objectives:
  sla_target_p99_ms: 200.0     # P99 latency target
  lambda_sla: 10.0             # SLA violation penalty weight
  lambda_variance: 2.0         # Latency variance penalty weight
  cost_per_replica_per_hour: 0.05

# ----------------------------------------------------------
# Simulation Parameters
# ----------------------------------------------------------
simulation:
  duration_s: 300.0            # Simulation time (seconds)
  warmup_s: 30.0               # Warmup period (excluded from metrics)
  resolution_s: 1.0            # Workload trace resolution

# ----------------------------------------------------------
# Workload Defaults
# ----------------------------------------------------------
workload:
  base_rate: 100.0             # requests/second
  noise_level: 0.05            # Gaussian noise fraction
  diurnal_amplitude: 0.6       # Fraction of base_rate
  diurnal_period_s: 86400.0    # 24 hours
  burst_count: 5               # Number of burst events
  burst_magnitude: 3.0         # Multiplier over base_rate
  burst_duration_s: 10.0       # Duration of each burst

# ----------------------------------------------------------
# Structure Learning
# ----------------------------------------------------------
structure_learning:
  method: spectral             # spectral | kmeans
  n_clusters: null             # null = auto-detect via silhouette
  sensitivity_delta: 0.05      # Perturbation fraction for sensitivity
  min_clusters: 2
  max_clusters: 5
